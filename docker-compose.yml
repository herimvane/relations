services:
  postgres:
    image: postgres:16-alpine
    container_name: nebulanet-postgres
    environment:
      POSTGRES_USER: nebulanet
      POSTGRES_PASSWORD: nebulanet
      POSTGRES_DB: relations
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nebulanet -d relations"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: nebulanet-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NEBULANET_DATASOURCES_CONFIG: /app/datasources.docker.json
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    container_name: nebulanet-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres-data:
